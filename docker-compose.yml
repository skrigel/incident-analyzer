version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: incident-platform-db
    environment:
      POSTGRES_DB: incident_platform
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user -d incident_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: